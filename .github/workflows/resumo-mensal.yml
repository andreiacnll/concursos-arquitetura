name: Enviar resumo mensal de concursos

on:
  workflow_dispatch:

  schedule:
    - cron: "0 10 1 * *"

jobs:
  enviar-resumo-mensal:
    runs-on: ubuntu-latest

    steps:
      - name: Obter o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Gerar e enviar resumo mensal
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "465"
          SMTP_USE_SSL: "true"
          SMTP_USER: andreiamarquescnlll@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: andreiamarquescnlll@gmail.com
          EMAIL_TO: andreiamarquescnlll@gmail.com
        run: python -m app.resumo_mensal
