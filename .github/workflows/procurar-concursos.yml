name: Procurar concursos de arquitetura

on:
  workflow_dispatch:

  schedule:
    # Sábado às 08:17 UTC
    - cron: "17 8 * * 6"

permissions:
  contents: write

concurrency:
  group: procurar-concursos
  cancel-in-progress: false

jobs:
  procurar-concursos:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      BASE_DIAS_PESQUISA: "7"
      BASE_INTERVALO_PEDIDOS: "7"
      BASE_INTERVALO_DETALHES: "10"
      BASE_MAX_PAGINAS: "30"
      BASE_MAX_DETALHES: "150"
      BASE_HEADLESS: "1"

    steps:
      - name: Obter o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar Chromium do Playwright
        run: |
          python -m playwright install chromium --with-deps

      - name: Procurar concursos e enviar email
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "465"
          SMTP_USE_SSL: "true"
          SMTP_USER: andreiamarquescnlll@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: andreiamarquescnlll@gmail.com
          EMAIL_TO: andreiamarquescnlll@gmail.com
        run: python -m app.main

      - name: Guardar atualização dos dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add concursos.db concursos_recolhidos.json

          if git diff --cached --quiet; then
            echo "Não existem alterações nos dados."
            exit 0
          fi

          git commit -m "Atualizar concursos da última semana"
          git push
